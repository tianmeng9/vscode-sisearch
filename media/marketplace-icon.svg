<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2a3e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#bg3)"/>
  <!-- Code lines (representing indexed source) -->
  <g opacity="0.15">
    <rect x="16" y="24" width="40" height="3" rx="1.5" fill="#4FC3F7"/>
    <rect x="16" y="34" width="56" height="3" rx="1.5" fill="#4FC3F7"/>
    <rect x="16" y="44" width="32" height="3" rx="1.5" fill="#4FC3F7"/>
    <rect x="16" y="84" width="48" height="3" rx="1.5" fill="#4FC3F7"/>
    <rect x="16" y="94" width="36" height="3" rx="1.5" fill="#4FC3F7"/>
    <rect x="16" y="104" width="52" height="3" rx="1.5" fill="#4FC3F7"/>
  </g>
  <!-- Central magnifying glass with lightning bolt (smart/fast search) -->
  <circle cx="64" cy="58" r="28" fill="none" stroke="#ffffff" stroke-width="3.5"/>
  <line x1="84" y1="78" x2="104" y2="98" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Lightning bolt inside lens (speed/intelligence) -->
  <polygon points="58,42 68,42 62,55 72,55 56,74 60,60 50,60" fill="#4FC3F7"/>
</svg>
