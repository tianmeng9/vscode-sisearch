<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
    <link rel="stylesheet" href="{{cssUri}}">
</head>
<body>
    <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search..." />
        <div class="toggle-buttons">
            <button id="optCase" class="toggle-btn" title="Match Case">Aa</button>
            <button id="optWord" class="toggle-btn" title="Match Whole Word">Ab</button>
            <button id="optRegex" class="toggle-btn" title="Use Regular Expression">.*</button>
            <button id="toggleFilters" class="toggle-btn" title="Toggle Search Filters">⋯</button>
        </div>
    </div>
    <div id="filterSection" class="filter-section hidden">
        <div class="filter-row">
            <input type="text" id="filesToInclude" placeholder="files to include (e.g. *.c, src/**)" />
        </div>
        <div class="filter-row">
            <input type="text" id="filesToExclude" placeholder="files to exclude (e.g. **/build/**)" />
        </div>
    </div>
    <div id="historyList"></div>
    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
