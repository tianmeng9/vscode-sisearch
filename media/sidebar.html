<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
    <link rel="stylesheet" href="{{cssUri}}">
</head>
<body>
    <div class="search-container">
        <div class="search-input-row">
            <input type="text" id="searchInput" placeholder="Search..." />
        </div>
        <div class="search-options">
            <label><input type="checkbox" id="optCase" /> Case</label>
            <label><input type="checkbox" id="optWord" /> Word</label>
            <label><input type="checkbox" id="optRegex" /> Regex</label>
        </div>
        <div class="search-actions">
            <button id="btnAppend" title="Append results">Append</button>
            <button id="btnReplace" title="Replace results">Replace</button>
        </div>
    </div>
    <div class="section-container">
        <div class="section-header">Search History</div>
        <div id="historyList"></div>
    </div>
    <div class="section-container">
        <div class="section-header">Highlights</div>
        <div id="highlightList"></div>
    </div>
    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
