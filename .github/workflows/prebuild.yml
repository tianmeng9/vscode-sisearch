name: Prebuild Native Modules

# Cross-platform native module prebuild + VSIX packaging matrix.
#
# TODO(M9): The Electron target version below is a placeholder matching
# approximately VS Code stable as of 2026-04 (Electron 34.x). The real value
# should be derived from the vscode/engines field in package.json at build
# time, or pinned via a dedicated config file. Update when engines.vscode
# moves beyond ^1.85.
#
# TODO(M9): Add linux-arm64 and win32-arm64 runners (cross-compile or native)
# once the x64 matrix is proven green.
#
# Status: first pass, untested on GitHub Actions runners. M9 iterates.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  prebuild:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            vsce_target: linux-x64
          - os: macos-latest
            arch: x64
            vsce_target: darwin-x64
          - os: macos-14        # Apple Silicon (M1/M2)
            arch: arm64
            vsce_target: darwin-arm64
          - os: windows-latest
            arch: x64
            vsce_target: win32-x64
          # linux-arm64 / win32-arm64 deferred (see TODO above).
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.vsce_target }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Compile TypeScript and copy wasm
        run: npm run vscode:prepublish

      - name: Rebuild better-sqlite3 for Electron
        run: npx @electron/rebuild -f -w better-sqlite3
        env:
          # VS Code 1.85+ ships Electron ~28-34 depending on release channel.
          # Hardcoded placeholder; see TODO at top of file.
          npm_config_target: '34.0.0'
          npm_config_runtime: 'electron'
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
          npm_config_disturl: 'https://electronjs.org/headers'

      - name: Package VSIX (platform-specific)
        run: npx @vscode/vsce package --target ${{ matrix.vsce_target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: sisearch-${{ matrix.vsce_target }}
          path: '*.vsix'
          if-no-files-found: error
